name: Spread Integration Tests

on:
  pull_request:

jobs:
  ci-ignore:
    name: Check against ignorelist
    runs-on: ubuntu-latest
    outputs:
      any_modified: ${{ steps.echo-changes.outputs.any_modified }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files in the PR
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files_ignore: |
            README.md
            CONTRIBUTING.md
            INTEGRATING.md
            CODEOWNERS
            LICENSE
            icon.svg
            .gitignore
            .github/**

      - name: Echo changed files
        id: echo-changes
        run: |
          echo "Changes made: ${{ steps.changed-files.outputs.any_modified }}"
          echo "any_modified=${{ steps.changed-files.outputs.any_modified }}" >> "$GITHUB_OUTPUT"

  pack-charm:
    name: Pack the coordinator charm
    runs-on: ubuntu-latest
    needs: [ci-ignore]
    if: needs.ci-ignore.outputs.any_modified == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup LXD
        uses: canonical/setup-lxd@main
      - name: Install charmcraft
        run: sudo snap install charmcraft --classic
      - name: Cache wheels
        uses: actions/cache@v4
        with:
          path: /home/runner/snap/charmcraft/common/cache/charmcraft
          key: ${{ runner.os }}-wheel-cache-${{ hashFiles('./uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-wheel-cache-
      - name: Run charmcraft pack
        run: |
          cd coordinator
          charmcraft pack -v

  spread-matrix:
    name: Define Spread integration tests matrix
    runs-on: ubuntu-latest
    needs: [pack-charm]
    if: needs.pack-charm.result == 'success'
    outputs:
      suites: ${{ steps.suites.outputs.suites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate matrix list
        id: suites
        run: |
          list="$(find coordinator/spread/integration -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | jq -r -ncR '[inputs]')"
          echo "suites=${list}"
          echo "suites=${list}" >> "$GITHUB_OUTPUT"

  spread-test:
    name: "Spread: ${{ matrix.suite }}"
    runs-on: ubuntu-24.04
    needs: [spread-matrix]
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.spread-matrix.outputs.suites) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # FIXME: Remove the below step when runners are configurable. See https://github.com/canonical/observability/issues/408.
      - name: Clean worker caches
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift /usr/lib/jvm /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google /opt/az /usr/local/.ghcup
          sudo docker image prune --all --force
          sudo docker builder prune -a
      - name: Setup LXD
        uses: canonical/setup-lxd@main
      - name: Install charmcraft
        run: sudo snap install charmcraft --classic --channel="3.x/candidate"
      - name: Run spread test
        env:
          SUITE: "${{ matrix.suite }}"
        run: |
          cd coordinator
          charmcraft test "spread/integration/${SUITE}"
      - name: Open SSH session on failure
        if: ${{ failure() && (runner.debug == '1') }}
        uses: mxschmitt/action-tmate@v3
        with:
          timeout-minutes: 30
          limit-access-to-actor: true
