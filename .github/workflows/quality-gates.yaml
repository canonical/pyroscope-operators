name: Quality Gates

on:
  # Manual trigger
  workflow_dispatch:
  # Run the quality checks periodically
  # FIXME: adjust the frequency as needed once we have actual gates in place
  # schedule:
  #   - cron: "0 0 * * Tue"

jobs:
  quality-gates-coordinator:
    name: Run quality gates
    uses: canonical/observability/.github/workflows/charm-quality-gates.yaml@e8084e0cc6409cda380d42632a858a8a511c5e4b # v2
    secrets: inherit
    with:
      charm-path: coordinator
  quality-gates-worker:
    name: Run quality gates
    uses: canonical/observability/.github/workflows/charm-quality-gates.yaml@e8084e0cc6409cda380d42632a858a8a511c5e4b # v2
    secrets: inherit
    with:
      charm-path: worker
