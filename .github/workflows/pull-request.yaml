name: Pull Requests

on:
  pull_request:

jobs:
  pull-request:
    strategy:
      fail-fast: true
      matrix:
        charm-path:
          - coordinator
          - worker
    uses: canonical/observability/.github/workflows/charm-pull-request.yaml@feat/spread-integration-tests
    secrets: inherit
    with:
      charm-path: ${{ matrix.charm-path }}
      enable-integration: false
      enable-spread-integration: ${{ matrix.charm-path == 'coordinator' }}
      juju-channel: 3.6/candidate
  interfaces:
    strategy:
      fail-fast: false
      matrix:
        charm:
          - pyroscope-coordinator-k8s
          - pyroscope-worker-k8s
    uses: canonical/charmlibs/.github/workflows/interface-tests.yaml@interface-tests-v0
    with:
      charm: ${{ matrix.charm }}
      charm-repo: ${{ github.event.pull_request.head.repo.full_name }}
      charm-branch: ${{ github.event.pull_request.head.ref }}
