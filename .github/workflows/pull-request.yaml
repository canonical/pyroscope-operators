name: Pull Requests

on:
  pull_request:
    branches:
      - main
      - track/**

jobs:
  pull-request:
    strategy:
      fail-fast: true
      matrix:
        charm-path:
          - coordinator
          - worker
    uses: canonical/observability/.github/workflows/charm-pull-request.yaml@main
    secrets: inherit
    with:
      charm-path: ${{ matrix.charm-path }}
      enable-integration: ${{ matrix.charm-path == 'coordinator' }}
      juju-channel: 3.6/candidate
