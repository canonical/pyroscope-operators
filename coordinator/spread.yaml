# Spread configuration for pyroscope-coordinator-k8s.
#
# FINDINGS FROM TASK 0 SPIKE (charmcraft test investigation):
#
# 1. LOCATION: spread.yaml must live in the charm directory (same dir as
#    charmcraft.yaml). `charmcraft test` is invoked from the charm directory
#    and reads spread.yaml from there.
#
# 2. CRAFT BACKEND: charmcraft auto-injects the `craft:` backend at runtime.
#    The system name must match the host distro string produced by
#    craft_platforms.DistroBase (e.g. "ubuntu-24.04").  On CI the name is
#    detected automatically; locally an `lxd-vm` backend is used instead.
#    Only `systems:` is needed here — all other backend fields are injected.
#
# 3. PATH / ENV: charmcraft processes this file into a temporary spread.yaml
#    that hard-codes:
#      path:           /root/proj
#      PROJECT_PATH:   /root/proj
#      CRAFT_ARTIFACT: $PROJECT_PATH/<packed-charm-filename>
#    Do not declare these here; they are injected unconditionally.
#
# 4. REROOT: charmcraft adds `reroot: ".."` so spread resolves all suite/task
#    paths relative to the charm directory (parent of the temp dir it creates).
#    Suite keys such as `spread/hello/` map to coordinator/spread/hello/.
#
# 5. EXTENSION SCRIPT: craft_application generates allocate/discard/prepare/
#    restore hooks that call `spread/.extension` with the backend name
#    (`lxd-vm` locally, `ci` in CI).  The script lives at
#    coordinator/spread/.extension.
#
# 6. TASK STRUCTURE: Each suite directory contains task *subdirectories*, each
#    holding a task.yaml.  A task.yaml placed directly at the suite root is
#    NOT discovered by spread.
#      Correct:  spread/<suite>/<task>/task.yaml
#      Wrong:    spread/<suite>/task.yaml  ← silently ignored
#
# 7. SUITE SYSTEMS REQUIRED: Every suite must list at least one system.
#    An omitted `systems:` serialises as `systems: []` which causes
#    "nothing matches provider filter" at runtime.
#
# 8. BACKEND ISOLATION: Using bare system names (e.g. `ubuntu-24.04`) causes
#    spread to run the suite on ALL backends that publish that system, which
#    makes the `ci` backend run locally and the `craft` backend run in CI.
#    Use backend-qualified names (`craft:ubuntu-24.04`, `ci:ubuntu-24.04`)
#    to restrict each suite to the backends it is meant for.

project: pyroscope-coordinator-k8s

# NOTE: `path:`, `PROJECT_PATH`, and top-level `environment:` are not
# permitted by CraftSpreadYaml — charmcraft injects them unconditionally.
# Per-suite environment blocks are allowed (see integration suite below).

exclude:
  - .git
  - .tox
  - .venv
  - ".*_cache"

backends:
  # craft: auto-managed by `charmcraft test` — only systems: is needed.
  # The ci adhoc backend (for GitHub Actions direct spread runs) is added
  # in the CI workflow (Task 7) and intentionally omitted here to prevent
  # spread from trying to allocate a CI machine during local charmcraft test runs.
  craft:
    systems:
      - ubuntu-24.04


suites:
  # Task 0 smoke test — kept for quick sanity checks.
  spread/hello/:
    summary: Trivial smoke test (Task 0 spike)
    manual: true
    systems:
      - ubuntu-24.04

  # Task 3 — unit + interface tests (no Juju required).
  spread/unit/:
    summary: Unit tests (coordinator + worker)
    systems:
      - ubuntu-24.04

  spread/interface/:
    summary: Interface compliance tests
    systems:
      - ubuntu-24.04

  # Task 4/5 — integration tests (requires Juju + MicroK8s).
  spread/integration/:
    summary: Integration tests
    kill-timeout: 120m
    systems:
      - ubuntu-24.04
    environment:
      COORDINATOR_CHARM_PATH: "$PROJECT_PATH/coordinator"
      WORKER_CHARM_PATH: "$PROJECT_PATH/worker"
      COORDINATOR_CHARM_CHANNEL: "latest/edge"
      WORKER_CHARM_CHANNEL: "latest/edge"
